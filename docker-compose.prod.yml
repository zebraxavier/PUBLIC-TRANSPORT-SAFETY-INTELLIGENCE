version: '3.8'

services:
  # MongoDB
  mongodb:
    image: mongo:7-latest
    container_name: ptsi-mongodb-prod
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-changeme}
      MONGO_INITDB_DATABASE: ptsi_db
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - ptsi-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 30s
      timeout: 10s
      retries: 3

  # Redis
  redis:
    image: redis:7-alpine
    container_name: ptsi-redis-prod
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme} --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - ptsi-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Python AI Service
  ai-service:
    image: ptsi-ai:latest
    container_name: ptsi-ai-service-prod
    restart: always
    environment:
      PORT: 8000
      REDIS_URL: redis://:${REDIS_PASSWORD:-changeme}@redis:6379
      CORS_ORIGINS: https://yourdomain.com,https://api.yourdomain.com
      LOG_LEVEL: info
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - ptsi-network
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Node.js Backend
  backend:
    image: ptsi-backend:latest
    container_name: ptsi-backend-prod
    restart: always
    environment:
      PORT: 5000
      NODE_ENV: production
      MONGODB_URI: mongodb://${MONGO_USER:-admin}:${MONGO_PASSWORD:-changeme}@mongodb:27017/ptsi_db?authSource=admin
      REDIS_URL: redis://:${REDIS_PASSWORD:-changeme}@redis:6379
      AI_SERVICE_URL: http://ai-service:8000
      JWT_SECRET: ${JWT_SECRET:-change_this_in_production}
    ports:
      - "5000:5000"
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      ai-service:
        condition: service_healthy
    networks:
      - ptsi-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # React Frontend
  frontend:
    image: ptsi-frontend:latest
    container_name: ptsi-frontend-prod
    restart: always
    environment:
      VITE_API_URL: https://api.yourdomain.com
      VITE_WS_URL: wss://api.yourdomain.com/ws
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - ptsi-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5173/"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  mongodb_data:
    driver: local
  redis_data:
    driver: local

networks:
  ptsi-network:
    driver: bridge
